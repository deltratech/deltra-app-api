name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: deltra-api-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/deltratech/deltra-app-api

jobs:
  # Build the production image on GitHub's fast runners (with layer cache) and
  # push it to GHCR. On PRs it only builds (verification); on push to main it
  # also pushes :latest and :<sha>. The VPS no longer builds anything.
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN,IMAGE_TAG
          script: |
            set -e

            retry() {
              attempts=3
              delay=15
              count=1
              until "$@"; do
                if [ "$count" -ge "$attempts" ]; then
                  return 1
                fi
                echo "Command failed. Retrying in ${delay}s... (${count}/${attempts})"
                count=$((count + 1))
                sleep "$delay"
              done
            }

            cd /deltra-app/deltra-app-api
            git fetch origin main
            git reset --hard origin/main

            # Authenticate to GHCR and pull the image CI already built — no build on the host.
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            retry docker compose pull api
            docker compose up -d --no-deps api
            docker logout ghcr.io
            docker image prune -f
            docker compose ps
