name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: deltra-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma clients
        run: |
          npx prisma generate
          npm run prisma:generate:tenant

      - name: Build
        run: npm run build

      - name: Build production Docker image
        run: docker build --target production -t deltra-app-api:ci .

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            retry() {
              attempts=3
              delay=15
              count=1
              until "$@"; do
                if [ "$count" -ge "$attempts" ]; then
                  return 1
                fi
                echo "Command failed. Retrying in ${delay}s... (${count}/${attempts})"
                count=$((count + 1))
                sleep "$delay"
              done
            }

            cd /deltra-app/deltra-app-api
            git fetch origin main
            git reset --hard origin/main
            retry docker pull node:24-alpine
            retry docker compose build api
            docker compose up -d --no-deps api
            docker image prune -f
            docker compose ps
